<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>ZZZ资料站 · 自整理</title>
  <style>
    :root{
      --bg:#ffffff; --panel:#ffffff; --fg:#0f172a; --muted:#64748b;
      --line:#e5e7eb; --hover:#f8fafc; --shadow: 0 10px 25px rgba(2,6,23,.06);
      --radius: 16px; --max: 1100px;
      --accent:#7c3aed; --accent-weak: rgba(124,58,237,.12);
      --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC",
              "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", "Helvetica Neue", Arial;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New";
    }
    [data-theme="dark"]{
      --bg:#0b0f14; --panel:#0f172a; --fg:#e5e7eb; --muted:#94a3b8;
      --line:#1f2937; --hover:#111c33; --shadow: 0 12px 30px rgba(0,0,0,.35);
      --accent:#a78bfa; --accent-weak: rgba(167,139,250,.14);
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font);line-height:1.75}
    a{color:inherit;text-decoration:none} a:hover{color:var(--accent)}
    .topbar{position:sticky;top:0;z-index:20;backdrop-filter: blur(14px);
      background: color-mix(in oklab, var(--bg) 78%, transparent);border-bottom:1px solid var(--line)}
    .inner{max-width:var(--max);margin:0 auto;padding:12px 16px;display:flex;gap:12px;align-items:center;justify-content:space-between}
    .brand{display:flex;gap:10px;align-items:center;font-weight:800;white-space:nowrap}
    .logo{width:28px;height:28px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#22c55e);
      box-shadow:0 8px 18px color-mix(in oklab, var(--accent) 20%, transparent)}
    .nav{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;align-items:center}
    .pill{display:inline-flex;gap:8px;align-items:center;padding:8px 10px;border:1px solid var(--line);border-radius:999px;
      background: color-mix(in oklab, var(--panel) 85%, transparent);color:var(--muted);font-size:13px}
    .pill:hover{background:var(--hover);color:var(--fg)}
    .pill[aria-current="page"]{color:var(--fg);border-color: color-mix(in oklab, var(--accent) 40%, var(--line));background:var(--accent-weak)}
    .wrap{max-width:var(--max);margin:0 auto;padding:24px 16px 64px}
    .grid{display:grid;gap:14px}
    @media(min-width:980px){.cols-2{grid-template-columns:1.1fr .9fr}}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .pad{padding:18px}
    .muted{color:var(--muted)}
    .hr{height:1px;background:var(--line);margin:14px 0}
    .search{display:flex;gap:8px;align-items:center;border:1px solid var(--line);background: color-mix(in oklab, var(--panel) 92%, transparent);
      border-radius:999px;padding:8px 10px;min-width:260px}
    .search input{border:none;outline:none;background:transparent;color:var(--fg);width:260px;max-width:48vw;font-size:14px}
    .search kbd{font-family:var(--mono);font-size:12px;color:var(--muted);border:1px solid var(--line);padding:2px 6px;border-radius:8px;
      background: color-mix(in oklab, var(--panel) 70%, transparent)}
    .btn{display:inline-flex;gap:8px;align-items:center;padding:9px 12px;border-radius:12px;border:1px solid var(--line);
      background: color-mix(in oklab, var(--panel) 92%, transparent);cursor:pointer;font-size:13px;color:var(--fg)}
    .btn:hover{background:var(--hover)}
    .tag{display:inline-flex;gap:6px;align-items:center;font-size:12px;padding:3px 10px;border:1px solid var(--line);border-radius:999px;
      color:var(--muted);background: color-mix(in oklab, var(--panel) 85%, transparent)}
    .tag:hover{background:var(--hover);color:var(--fg)}
    .item{padding:14px;border:1px solid var(--line);border-radius:14px;background: color-mix(in oklab, var(--panel) 92%, transparent)}
    .item:hover{background:var(--hover);border-color: color-mix(in oklab, var(--accent) 25%, var(--line))}
    .title{margin:0 0 6px;font-size:18px;font-weight:800}
    .meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;color:var(--muted);font-size:13px}
    article{padding:22px 18px}
    article h1{font-size:30px;line-height:1.2;margin:0 0 10px}
    article h2{font-size:22px;margin:24px 0 8px}
    article h3{font-size:18px;margin:20px 0 6px}
    article pre{background:#0b1020;color:#e5e7eb;border-radius:14px;padding:14px;overflow:auto;border:1px solid color-mix(in oklab, var(--line) 70%, transparent)}
    article code{font-family:var(--mono);font-size:13px;background: color-mix(in oklab, var(--panel) 70%, var(--hover));border:1px solid var(--line);
      padding:2px 6px;border-radius:8px}
    footer{margin-top:26px;padding-top:18px;border-top:1px solid var(--line);color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;justify-content:space-between;font-size:13px}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="inner">
      <a class="brand" href="#/">
        <span class="logo" aria-hidden="true"></span>
        <span id="brandText">ZZZ资料站 · 自整理</span>
      </a>

      <div class="nav">
        <a class="pill" id="navHome" href="#/">首页</a>
        <a class="pill" id="navDb" href="#/db">数据库</a>
        <a class="pill" id="navAbout" href="#/about">关于</a>

        <div class="search" title="搜索（按 / 聚焦）">
          <input id="q" placeholder="搜：代理人 / 音擎 / 驱动盘 / 材料…" autocomplete="off" />
          <kbd>/</kbd>
        </div>

        <button class="btn" id="themeBtn">主题</button>
      </div>
    </div>
  </header>

  <div class="wrap">
    <div id="app"></div>

    <footer>
      <div>
        <span>© <span id="year"></span> <span id="footerSite">ZZZ资料站 · 自整理</span></span>
        <span class="muted"> · 公开信息 + 自己整理内容（不搬运第三方整站数据）</span>
      </div>
      <div class="muted">建议：写清数据来源与许可（官方/自己撰写/授权）</div>
    </footer>
  </div>

<script>
/* =====================
   DIY：站点信息
   ===================== */
const SITE = {
  title: "ZZZ资料站 · 自整理",
  description: "公开信息与个人笔记整合：代理人/音擎/驱动盘/材料。支持搜索、标签、详情页。",
  author: "你的名字/绳匠代号",
  accent: "#7c3aed",
  // 公开站建议加：免责声明/版权说明/数据来源
  disclaimer: "本网站为玩家个人整理站点，游戏素材版权归原权利方所有；文本内容为站长自写或来源于公开信息并标注。",
};

/* =====================
   数据加载：从 /data/*.json 拉取
   你只需要编辑 data 文件即可
   ===================== */
const SOURCES = [
  { key:"agents",   label:"代理人",   file:"/data/agents.json" },
  { key:"engines",  label:"音擎",     file:"/data/engines.json" },
  { key:"drives",   label:"驱动盘",   file:"/data/drives.json" },
  { key:"materials",label:"材料",     file:"/data/materials.json" },
];

const $app = document.getElementById("app");
const $q = document.getElementById("q");

document.getElementById("brandText").textContent = SITE.title;
document.getElementById("footerSite").textContent = SITE.title;
document.getElementById("year").textContent = new Date().getFullYear();
document.title = SITE.title;
document.documentElement.style.setProperty("--accent", SITE.accent);

/* theme */
const THEME_KEY="zzz_public_db_theme";
function applyTheme(t){ document.documentElement.setAttribute("data-theme", t); localStorage.setItem(THEME_KEY,t); }
(function(){
  const saved = localStorage.getItem(THEME_KEY);
  if(saved) return applyTheme(saved);
  const dark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  applyTheme(dark?"dark":"light");
})();
document.getElementById("themeBtn").addEventListener("click", () => {
  const now = document.documentElement.getAttribute("data-theme") || "light";
  applyTheme(now==="dark"?"light":"dark");
});
window.addEventListener("keydown",(e)=>{ if(e.key==="/" && document.activeElement!==$q){ e.preventDefault(); $q.focus(); }});

/* tiny utils */
const el = (html)=>{const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstElementChild;};
const esc = (s)=>String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
const norm=(s)=>String(s??"").toLowerCase().trim();
const uniq=(a)=>Array.from(new Set(a));
const fmtDate=(s)=>{ if(!s) return ""; const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d).toLocaleDateString("zh-CN",{year:"numeric",month:"2-digit",day:"2-digit"}); };

let DB = null; // { agents:[...], engines:[...], ... }
async function loadAll(){
  const out = {};
  for(const s of SOURCES){
    const r = await fetch(s.file, { cache:"no-store" });
    if(!r.ok) throw new Error(\`加载失败 \${s.file} status=\${r.status}\`);
    out[s.key] = await r.json();
  }
  DB = out;
}
function route(){
  const h = location.hash || "#/";
  const p = h.replace(/^#/,"");
  const parts = p.split("/").filter(Boolean);
  return parts;
}
function setNav(parts){
  const set=(id,on)=>{const n=document.getElementById(id); if(!n) return; on?n.setAttribute("aria-current","page"):n.removeAttribute("aria-current");};
  set("navHome", parts.length===0);
  set("navDb", parts[0]==="db");
  set("navAbout", parts[0]==="about");
}

/* render */
function renderHome(){
  const counts = SOURCES.map(s=>({label:s.label, key:s.key, n:(DB?.[s.key]?.length||0)}));
  const all = SOURCES.flatMap(s => (DB?.[s.key]||[]).map(x => ({...x, _type:s.key, _typeLabel:s.label})));
  const latest = all
    .filter(x=>x.updatedAt || x.releaseAt || x.date)
    .sort((a,b)=> norm(b.updatedAt||b.releaseAt||b.date).localeCompare(norm(a.updatedAt||a.releaseAt||a.date)))
    .slice(0, 8);

  $app.innerHTML="";
  $app.appendChild(el(`
    <div class="grid cols-2">
      <div class="card pad">
        <h2 style="margin:0 0 6px;font-size:18px;">${esc(SITE.title)}</h2>
        <div class="muted">${esc(SITE.description)}</div>
        <div class="hr"></div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          ${counts.map(c=>`<a class="tag" href="#/db/${encodeURIComponent(c.key)}">${esc(c.label)} · ${c.n}</a>`).join("")}
        </div>
        <div class="hr"></div>
        <div class="muted" style="font-size:13px;">免责声明：${esc(SITE.disclaimer)}</div>
      </div>

      <div class="card pad">
        <div style="font-weight:800;">使用提示</div>
        <div class="muted" style="margin-top:6px;font-size:13px;">
          这是一个“公开整理站”：只放你有权发布的内容（官方公开信息 + 你自己写的笔记/评测/攻略）。
          你可以在 data/*.json 里持续补全数据。
        </div>
        <div class="hr"></div>
        <a class="tag" href="#/db">进入数据库</a>
        <a class="tag" href="#/about">关于与来源</a>
      </div>
    </div>

    <div style="height:14px"></div>

    <div class="card pad">
      <div style="display:flex;gap:10px;align-items:end;justify-content:space-between;flex-wrap:wrap;">
        <h2 style="margin:0;">最近更新</h2>
        <div class="muted" style="font-size:13px;">按 / 搜索全站</div>
      </div>
      <div class="hr"></div>
      <div class="grid" id="list"></div>
    </div>
  `));
  const list = document.getElementById("list");
  if(!latest.length){
    list.appendChild(el(`<div class="item"><div class="muted">暂无“更新时间字段”的条目。你可以给数据加 updatedAt。</div></div>`));
  }else{
    latest.forEach(x=> list.appendChild(cardItem(x)));
  }
}

function cardItem(x){
  const when = x.updatedAt || x.releaseAt || x.date || "";
  const tags = (x.tags||[]).slice(0, 8).map(t=>`<span class="tag">#${esc(t)}</span>`).join("");
  return el(`
    <a class="item" href="#/db/${encodeURIComponent(x._type)}/${encodeURIComponent(x.id)}">
      <div class="title">${esc(x.name)}</div>
      <div class="meta">
        <span>📚 ${esc(x._typeLabel)}</span>
        ${when?`<span>·</span><span>🕒 ${esc(fmtDate(when))}</span>`:""}
        ${x.rarity?`<span>·</span><span>⭐ ${esc(x.rarity)}</span>`:""}
      </div>
      ${x.summary?`<div class="muted" style="margin-top:8px;">${esc(x.summary)}</div>`:""}
      ${tags?`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">${tags}</div>`:""}
    </a>
  `);
}

function renderDbIndex(){
  $app.innerHTML="";
  $app.appendChild(el(`
    <div class="card pad">
      <h2 style="margin:0;">数据库</h2>
      <div class="muted">按分类浏览（你可以继续扩展更多分类）</div>
      <div class="hr"></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        ${SOURCES.map(s=>`<a class="tag" href="#/db/${encodeURIComponent(s.key)}">${esc(s.label)} · ${(DB?.[s.key]?.length||0)}</a>`).join("")}
      </div>
    </div>
  `));
}

function renderDbList(type){
  const src = SOURCES.find(s=>s.key===type);
  if(!src) return renderNotFound();

  const items = (DB?.[type]||[]);
  const allTags = uniq(items.flatMap(x=>x.tags||[])).sort((a,b)=>a.localeCompare(b,"zh"));
  const q = norm($q.value);

  const filtered = items
    .map(x=>({...x, _type:type, _typeLabel:src.label}))
    .filter(x=>{
      if(!q) return true;
      const hay = norm([x.name,x.summary,x.body,(x.tags||[]).join(" "),(x.faction||""),(x.role||""),(x.attribute||"")].join("\n"));
      return hay.includes(q);
    });

  $app.innerHTML="";
  $app.appendChild(el(`
    <div class="card pad">
      <div style="display:flex;gap:10px;align-items:end;justify-content:space-between;flex-wrap:wrap;">
        <div>
          <h2 style="margin:0;">${esc(src.label)}</h2>
          <div class="muted">共 ${filtered.length} 条（总 ${items.length}）</div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <a class="tag" href="#/db">← 分类</a>
          <a class="tag" href="#/">← 首页</a>
        </div>
      </div>

      <div class="hr"></div>

      <div class="muted" style="font-size:13px;">常用标签：</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;">
        ${allTags.slice(0, 18).map(t=>`<a class="tag" href="#/db/${encodeURIComponent(type)}?tag=${encodeURIComponent(t)}">#${esc(t)}</a>`).join("")}
        ${allTags.length>18?`<a class="tag" href="#/db/${encodeURIComponent(type)}">更多…</a>`:""}
      </div>

      <div class="hr"></div>
      <div class="grid" id="list"></div>
    </div>
  `));

  // tag filter from query
  const hash = location.hash;
  const tag = (hash.includes("?tag=") ? decodeURIComponent(hash.split("?tag=")[1]||"") : "");
  const list = document.getElementById("list");
  const finalItems = tag ? filtered.filter(x => (x.tags||[]).includes(tag)) : filtered;

  if(tag){
    list.appendChild(el(`<div class="item"><div class="muted">已按标签过滤：<span class="tag">#${esc(tag)}</span></div></div>`));
  }

  finalItems.forEach(x=> list.appendChild(cardItem(x)));
  if(!finalItems.length){
    list.appendChild(el(`<div class="item"><div class="muted">没有结果。试试换关键词或清空搜索。</div></div>`));
  }
}

function renderDbDetail(type, id){
  const src = SOURCES.find(s=>s.key===type);
  if(!src) return renderNotFound();
  const x = (DB?.[type]||[]).find(i=>String(i.id)===String(id));
  if(!x) return renderNotFound();

  $app.innerHTML="";
  $app.appendChild(el(`
    <div class="card">
      <article>
        <div class="meta" style="margin-bottom:10px;">
          <a class="tag" href="#/db/${encodeURIComponent(type)}">← 返回列表</a>
          <span>📚 ${esc(src.label)}</span>
          ${x.updatedAt?`<span>·</span><span>🕒 更新 ${esc(fmtDate(x.updatedAt))}</span>`:""}
        </div>

        <h1>${esc(x.name)}</h1>
        ${x.summary?`<p class="muted" style="margin-top:6px;">${esc(x.summary)}</p>`:""}

        <div style="display:flex;gap:8px;flex-wrap:wrap;margin: 10px 0 14px;">
          ${(x.tags||[]).map(t=>`<a class="tag" href="#/db/${encodeURIComponent(type)}?tag=${encodeURIComponent(t)}">#${esc(t)}</a>`).join("")}
          ${x.rarity?`<span class="tag">⭐ ${esc(x.rarity)}</span>`:""}
          ${x.role?`<span class="tag">定位：${esc(x.role)}</span>`:""}
          ${x.attribute?`<span class="tag">属性：${esc(x.attribute)}</span>`:""}
          ${x.faction?`<span class="tag">阵营：${esc(x.faction)}</span>`:""}
        </div>

        <div class="hr"></div>

        <h2>详情</h2>
        <pre><code>${esc(JSON.stringify(x, null, 2))}</code></pre>

        <div class="hr"></div>
        <h2>站长笔记（可选）</h2>
        <p class="muted">建议把“自己的理解/攻略/评价”写进数据里的 body 字段（不要粘贴搬运别人的整段文案）。</p>
        ${x.body?`<pre><code>${esc(x.body)}</code></pre>`:""}

      </article>
    </div>
  `));
}

function renderAbout(){
  $app.innerHTML="";
  $app.appendChild(el(`
    <div class="card">
      <article>
        <h1>关于与来源</h1>
        <p class="muted">公开站建议写清：哪些是官方公开信息，哪些是你自己撰写整理，避免搬运第三方整站内容。</p>

        <h2>建议的合规做法</h2>
        <ul>
          <li>数据字段（数值/名称/效果）尽量来自<strong>官方公开渠道</strong>并注明来源</li>
          <li>攻略与评价请写<strong>你自己的表达</strong></li>
          <li>图片/图标尽量用你有权使用的素材或官方允许的媒体资源（并标注版权归属）</li>
        </ul>

        <div class="hr"></div>
        <div class="muted">免责声明：${esc(SITE.disclaimer)}</div>
        <div class="hr"></div>
        <a class="tag" href="#/">← 返回首页</a>
      </article>
    </div>
  `));
}

function renderNotFound(){
  $app.innerHTML="";
  $app.appendChild(el(`
    <div class="card">
      <article>
        <h1>404</h1>
        <p class="muted">页面不存在。</p>
        <div class="hr"></div>
        <a class="tag" href="#/">← 回首页</a>
      </article>
    </div>
  `));
}

function setNav(parts){
  const home=document.getElementById("navHome");
  const db=document.getElementById("navDb");
  const about=document.getElementById("navAbout");
  [home,db,about].forEach(n=>n && n.removeAttribute("aria-current"));
  if(parts.length===0) home.setAttribute("aria-current","page");
  if(parts[0]==="db") db.setAttribute("aria-current","page");
  if(parts[0]==="about") about.setAttribute("aria-current","page");
}

function render(){
  const parts = route();
  setNav(parts);

  // global search overrides: render db index + hits
  const q = norm($q.value);
  if(q){
    const all = SOURCES.flatMap(s => (DB?.[s.key]||[]).map(x => ({...x,_type:s.key,_typeLabel:s.label})));
    const hits = all.filter(x => norm([x.name,x.summary,x.body,(x.tags||[]).join(" "),x.faction,x.role,x.attribute].join("\n")).includes(q));
    $app.innerHTML="";
    $app.appendChild(el(`
      <div class="card pad">
        <div style="display:flex;gap:10px;align-items:end;justify-content:space-between;flex-wrap:wrap;">
          <div>
            <h2 style="margin:0;">搜索</h2>
            <div class="muted">关键词：<code>${esc(q)}</code> · 结果：${hits.length}</div>
          </div>
          <button class="btn" id="clearBtn">清空</button>
        </div>
        <div class="hr"></div>
        <div class="grid" id="list"></div>
      </div>
    `));
    document.getElementById("clearBtn").onclick=()=>{$q.value=""; render();};
    const list=document.getElementById("list");
    hits.slice(0, 80).forEach(x=>list.appendChild(cardItem(x)));
    if(!hits.length) list.appendChild(el(`<div class="item"><div class="muted">没有结果。</div></div>`));
    return;
  }

  if(parts.length===0) return renderHome();
  if(parts[0]==="db" && parts.length===1) return renderDbIndex();
  if(parts[0]==="db" && parts.length===2) return renderDbList(decodeURIComponent(parts[1]).split("?")[0]);
  if(parts[0]==="db" && parts.length>=3) return renderDbDetail(decodeURIComponent(parts[1]), decodeURIComponent(parts[2]));
  if(parts[0]==="about") return renderAbout();
  return renderNotFound();
}

$q.addEventListener("input", () => render());
window.addEventListener("hashchange", () => render());

(async function main(){
  try{
    await loadAll();
    render();
  }catch(e){
    $app.innerHTML = "";
    $app.appendChild(el(`<div class="card pad"><h2 style="margin:0;">数据加载失败</h2><div class="hr"></div><pre><code>${esc(String(e?.message||e))}</code></pre></div>`));
  }
})();
</script>
</body>
</html>
